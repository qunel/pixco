<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロフィール - PIXCO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ffffff;
            color: #333;
        }
        .header {
            background-color: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 15px 30px;
            display: flex;
            align-items: center;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
            -webkit-text-stroke: 1px #000;
            letter-spacing: 2px;
        }
        .container {
            display: flex;
            min-height: calc(100vh - 60px);
        }
        .sidebar {
            width: 220px;
            background-color: #fafafa;
            border-right: 1px solid #e0e0e0;
            padding: 20px;
        }
        .sidebar ul {
            list-style: none;
        }
        .sidebar li {
            margin-bottom: 8px;
        }
        .sidebar a {
            color: #666;
            text-decoration: none;
            display: block;
            padding: 10px 15px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .sidebar a:hover {
            background-color: #eee;
            color: #333;
        }
        .main-content {
            flex: 1;
            padding: 40px;
            max-width: 800px;
        }
        .profile-header {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
        }
        .profile-image {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #ff6b6b, #ffa502);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }
        .profile-info h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .profile-info p {
            color: #666;
            line-height: 1.6;
        }
        .profile-section {
            margin-top: 30px;
        }
        .profile-section h2 {
            font-size: 1.3rem;
            border-bottom: 2px solid #ff6b6b;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .profile-section p {
            line-height: 1.8;
            color: #555;
        }
        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .character-card {
            text-align: center;
            padding: 15px;
            background: #fafafa;
            border-radius: 10px;
        }
        .character-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 10px;
        }
        .character-name {
            font-weight: bold;
            font-size: 0.9rem;
        }
        .header {
            justify-content: space-between;
        }
        .dark-toggle {
            background: none;
            border: 1px solid #ccc;
            border-radius: 20px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 1rem;
            color: #333;
        }
        body.dark {
            background-color: #1a1a1a;
            color: #e0e0e0;
        }
        body.dark .header {
            background-color: #222;
            border-bottom-color: #444;
        }
        body.dark .sidebar {
            background-color: #222;
            border-right-color: #444;
        }
        body.dark .sidebar a {
            color: #bbb;
        }
        body.dark .sidebar a:hover {
            background-color: #333;
            color: #fff;
        }
        body.dark .dark-toggle {
            border-color: #666;
            color: #e0e0e0;
        }
        body.dark .character-card {
            background: #2a2a2a;
        }
        .hamburger { display: none; background: none; border: none; font-size: 1.6rem; cursor: pointer; padding: 4px 8px; color: #333; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; }
        .sidebar-overlay.open { display: block; }
        body.dark .hamburger { color: #e0e0e0; }
        @media (max-width: 768px) {
            .hamburger { display: block; }
            .sidebar { position: fixed; top: 0; left: -240px; height: 100%; z-index: 200; transition: left 0.3s; padding-top: 60px; }
            .sidebar.open { left: 0; }
            .container { flex-direction: column; }
            .main-content { padding: 20px; }
            .profile-header { flex-direction: column; align-items: center; text-align: center; gap: 16px; }
            .profile-image { width: 110px; height: 110px; font-size: 3rem; }
        }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleMenu()"></div>
    <div class="header">
        <div style="display:flex;align-items:center;gap:10px;">
            <button class="hamburger" onclick="toggleMenu()">☰</button>
            <div class="logo">PIXCO</div>
        </div>
        <button class="dark-toggle" id="dark-toggle" onclick="toggleDark()">🌙 ダーク</button>
    </div>
    <div class="container">
        <div class="sidebar" id="sidebar">
            <ul>
                <li><a href="/">ホーム</a></li>
                <li><a href="/profile/">プロフィール</a></li>
                <li><a href="/collect/">画像収集</a></li>
            </ul>
        </div>
        <div class="main-content">
            <div class="profile-header">
                <div class="profile-image">👦</div>
                <div class="profile-info">
                    <h1>野原しんのすけ</h1>
                    <p>PIXCOの管理者</p>
                </div>
            </div>

            <div class="profile-section">
                <h2>自己紹介</h2>
                <p>
                    こんにちは！ぼくは野原しんのすけです。
                    春日部市東みずきぐちに住んでいます。
                    おかしあげます！が大好きなおかしです。
                    将来の夢はパイロットです！
                </p>
            </div>

            <div class="profile-section">
                <h2>家族</h2>
                <div class="character-grid">
                    <div class="character-card">
                        <div class="character-icon" style="background: #ff9ff3;"></div>
                        <div class="character-name">みさえ</div>
                    </div>
                    <div class="character-card">
                        <div class="character-icon" style="background: #54a0ff;"></div>
                        <div class="character-name">ひまわり</div>
                    </div>
                    <div class="character-card">
                        <div class="character-icon" style="background: #5f27cd; color: white;">お</div>
                        <div class="character-name">およし</div>
                    </div>
                    <div class="character-card">
                        <div class="character-icon" style="background: #ff6b6b;"></div>
                        <div class="character-name">しんのすけ</div>
                    </div>
                </div>
            </div>

            <div class="profile-section">
                <h2>お気に入り</h2>
                <p>
                    • おかしあげます！<br>
                    • スパイ河岸（ひとよし）<br>
                    • アクション仮面<br>
                    • ケツメン
                </p>
            </div>
        </div>
    </div>
    <script>
        function toggleDark() {
            const isDark = document.body.classList.toggle('dark');
            localStorage.setItem('darkMode', isDark);
            document.getElementById('dark-toggle').textContent = isDark ? '☀️ ライト' : '🌙 ダーク';
        }
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark');
            document.getElementById('dark-toggle').textContent = '☀️ ライト';
        }
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('open');
        }
    </script>
</body>
</html>
