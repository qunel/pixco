<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - PIXCO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f0f0f0; color: #333; }
        .header { background-color: #fff; border-bottom: 1px solid #e0e0e0; padding: 15px 30px; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 1.8rem; font-weight: bold; color: #fff; -webkit-text-stroke: 1px #000; letter-spacing: 2px; }
        .dark-toggle { background: none; border: 1px solid #ccc; border-radius: 20px; padding: 6px 14px; cursor: pointer; font-size: 1rem; color: #333; }
        .main-content { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #666; text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: #333; }
        h1 { font-size: 1.6rem; font-weight: 400; margin-bottom: 24px; }
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }
        .image-grid a { display: block; }
        .image-grid img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #ddd;
            transition: opacity 0.2s;
        }
        .image-grid img:hover { opacity: 0.85; }
        .error { background: #ffe0e0; border: 1px solid #cc0000; padding: 14px; border-radius: 8px; color: #cc0000; }
        .empty { color: #999; }

        body.dark { background-color: #1a1a1a; color: #e0e0e0; }
        body.dark .header { background-color: #222; border-bottom-color: #444; }
        body.dark .dark-toggle { border-color: #666; color: #e0e0e0; }
        body.dark .back-link { color: #aaa; }
        body.dark .back-link:hover { color: #fff; }
        body.dark .image-grid img { border-color: #444; }
        @media (max-width: 768px) {
            .main-content { padding: 16px; }
            h1 { font-size: 1.2rem; }
            .image-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
            .image-grid img { height: 140px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">PIXCO</div>
        <button class="dark-toggle" id="dark-toggle" onclick="toggleDark()">🌙 ダーク</button>
    </div>
    <div class="main-content">
        <a class="back-link" href="javascript:history.back()">← 戻る</a>
        <h1>{{ title }}</h1>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% elif images %}
            <div class="image-grid">
                {% for img in images %}
                    <a href="{{ img.full }}" target="_blank">
                        <img src="{{ img.thumb }}" alt="" loading="lazy">
                    </a>
                {% endfor %}
            </div>
        {% else %}
            <p class="empty">画像が見つかりませんでした。</p>
        {% endif %}
    </div>
    <script>
        function toggleDark() {
            const isDark = document.body.classList.toggle('dark');
            localStorage.setItem('darkMode', isDark);
            document.getElementById('dark-toggle').textContent = isDark ? '☀️ ライト' : '🌙 ダーク';
        }
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark');
            document.getElementById('dark-toggle').textContent = '☀️ ライト';
        }
    </script>
</body>
</html>
