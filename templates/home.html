<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXCO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ffffff;
            color: #333;
        }
        .header {
            background-color: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 15px 30px;
            display: flex;
            align-items: center;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
            -webkit-text-stroke: 1px #000;
            letter-spacing: 2px;
        }
        .container {
            display: flex;
            min-height: calc(100vh - 60px);
        }
        .sidebar {
            width: 220px;
            background-color: #fafafa;
            border-right: 1px solid #e0e0e0;
            padding: 20px;
        }
        .sidebar ul {
            list-style: none;
        }
        .sidebar li {
            margin-bottom: 8px;
        }
        .sidebar a {
            color: #666;
            text-decoration: none;
            display: block;
            padding: 10px 15px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .sidebar a:hover {
            background-color: #eee;
            color: #333;
        }
        .main-content {
            flex: 1;
            padding: 40px;
        }
        .main-content h1 {
            color: #333;
            font-size: 2rem;
            font-weight: 300;
            margin-bottom: 30px;
        }
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        .image-grid img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        .header {
            justify-content: space-between;
        }
        .dark-toggle {
            background: none;
            border: 1px solid #ccc;
            border-radius: 20px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 1rem;
            color: #333;
        }
        body.dark {
            background-color: #1a1a1a;
            color: #e0e0e0;
        }
        body.dark .header {
            background-color: #222;
            border-bottom-color: #444;
        }
        body.dark .sidebar {
            background-color: #222;
            border-right-color: #444;
        }
        body.dark .sidebar a {
            color: #bbb;
        }
        body.dark .sidebar a:hover {
            background-color: #333;
            color: #fff;
        }
        body.dark .dark-toggle {
            border-color: #666;
            color: #e0e0e0;
        }
        body.dark .image-grid img {
            border-color: #444;
        }
        body.dark .main-content div {
            color: #e0e0e0;
        }
        body.dark .main-content h1 {
            color: #e0e0e0;
        }
        .hamburger {
            display: none;
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 4px 8px;
            color: #333;
        }
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 100;
        }
        .sidebar-overlay.open { display: block; }
        body.dark .hamburger { color: #e0e0e0; }
        @media (max-width: 768px) {
            .hamburger { display: block; }
            .sidebar {
                position: fixed;
                top: 0; left: -240px;
                height: 100%;
                z-index: 200;
                transition: left 0.3s;
                padding-top: 60px;
            }
            .sidebar.open { left: 0; }
            .container { flex-direction: column; }
            .main-content { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleMenu()"></div>
    <div class="header">
        <div style="display:flex;align-items:center;gap:10px;">
            <button class="hamburger" onclick="toggleMenu()">☰</button>
            <div class="logo">PIXCO</div>
        </div>
        <button class="dark-toggle" id="dark-toggle" onclick="toggleDark()">🌙</button>
    </div>
    <div class="container">
        <div class="sidebar" id="sidebar">
            <ul>
                <li><a href="/">ホーム</a></li>
                <li><a href="/profile/">プロフィール</a></li>
                <li><a href="/collect/">画像収集</a></li>
            </ul>
        </div>
        <div class="main-content">
            <h1>PIXCOとは</h1>
            <div style="margin-bottom: 30px; line-height: 1.9; color: #555;">
                <p>画像収集するためのサイトです。</p>
                <p>現在テスト運用中です。</p>
                <p>本サイトは画像のURLリンクを取得・表示するのみであり、画像の保存・複製等は一切行っておりません。</p>
            </div>
        </div>
    </div>
    <script>
        function toggleDark() {
            const isDark = document.body.classList.toggle('dark');
            localStorage.setItem('darkMode', isDark);
            document.getElementById('dark-toggle').textContent = isDark ? '☀️' : '🌙';
        }
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark');
            document.getElementById('dark-toggle').textContent = '☀️';
        }
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('open');
        }
    </script>
</body>
</html>
